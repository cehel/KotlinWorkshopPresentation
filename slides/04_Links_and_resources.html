<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>01 Intro | Example Content</title>

    <link rel="icon" href="../img/zuehlke_logo.jpg">
    <link rel="stylesheet" href="../css/reveal.css">
    <link rel="stylesheet" href="../css/theme/zuehlke.css">

    <!-- Theme used for syntax highlighting of code -->
    <link rel="stylesheet" href="../lib/css/atom-one-dark.css">

    <!-- Printing and PDF exports -->
    <script>
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.type = 'text/css';
        link.href = window.location.search.match(/print-pdf/gi) ? '../css/print/pdf.css' : '../css/print/paper.css';
        document.getElementsByTagName('head')[0].appendChild(link);
    </script>
</head>
<body>
<div class="reveal">
    <div class="slides">

            <section>

                <ul>
                    <li>
                        Kotlin Documentation: <a href="https://kotlinlang.org/">https://kotlinlang.org/</a>
                    </li>
                    <li>
                        Try Kotlin:  <a href="https://try.kotlinlang.org/">https://try.kotlinlang.org/</a>
                    </li>
                    <li>
                        Kotlin Playground:  <a href="https://play.kotlinlang.org/">https://play.kotlinlang.org/</a>
                    </li>
                    <li>
                        Coursera Kotlin:  <a href="https://www.coursera.org/learn/kotlin-for-java-developers">https://www.coursera.org/learn/kotlin-for-java-developers</a>
                    </li>
                </ul>

            </section>


    </div>
</div>

<script src="../lib/js/head.min.js"></script>
<script src="../js/reveal.js"></script>

<script>
    // More info https://github.com/hakimel/reveal.js#configuration
    Reveal.initialize({
        history: true,

        // More info https://github.com/hakimel/reveal.js#dependencies
        dependencies: [
            { src: '../plugin/markdown/marked.js' },
            { src: '../plugin/markdown/markdown.js' },
            { src: '../plugin/notes/notes.js', async: true },
            {
                src: '../plugin/highlight/highlight.js', async: true, callback: function () {
                hljs.initHighlightingOnLoad();
            }
            }
        ]
    });
</script>
</body>
</html>
